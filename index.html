<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<title>Ideias da Toca do Pinguim!</title>

<meta property="og:title" content="cdn.jar - Ideias">
<meta property="og:description" content="Nada aqui">

<!-- IMPORTANTE: O link da imagem abaixo deve ser o link COMPLETO do seu site no GitHub -->

<meta property="og:type" content="website">


  
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  display: flex;
  color: #fff;
}

/* SIDEBAR */
.sidebar {
  width: 230px;
  height: 100vh;
  background: linear-gradient(180deg, #1f1f1f, #141414);
  padding: 20px;
}

.sidebar h3 {
  color: #aaa;
  font-size: 12px;
  margin-top: 20px;
}

.sidebar a {
  display: block;
  color: #ccc;
  text-decoration: none;
  padding: 10px;
  border-radius: 6px;
}

.sidebar a:hover {
  background: #2a2a2a;
  color: #fff;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* PROFILE CARD */
.profile {
  background: linear-gradient(180deg, #2b2b2b, #1c1c1c);
  padding: 20px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.avatar {
  width: 70px;
  height: 70px;
  background: #333;
  border-radius: 10px;
  object-fit: cover; /* Garante que a imagem não fique esticada */
  border: 1px solid #444; /* Um pequeno contorno para destacar */
}

.badge {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-right: 5px;
  margin-top: 5px;
}

.admin { background: orange; }
.ok { background: #2ecc71; }
.owner { background: #9370DB; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

/* PANELS */
.panel {
  background: linear-gradient(180deg, #2b2b2b, #1c1c1c);
  padding: 20px;
  border-radius: 10px;
}

.panel h2 {
  font-size: 16px;
  margin-bottom: 10px;
}

/* SUMMARY BOX */
.summary-box {
  background: #204a4a;
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 15px;
}

/* INFO GRID */
.info {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 15px;
}

.info div {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 6px;
  font-size: 13px;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.red { background: #e84142; color: white; }
.dark { background: #2a2a2a; color: #ddd; }
.green { background: #2ecc71; color: white; }

.btn:hover { opacity: 0.9; }

/* INPUT */
.input {
  width: 100%;
  padding: 10px;
  background: #222;
  border: 1px solid #444;
  border-radius: 6px;
  color: #fff;
  margin-top: 10px;
  box-sizing: border-box; /* Evita que o input saia da caixa */
}

  .username {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.verified {
  width: 16px;
  height: 16px;
}
</style>
</head>

<!-- MAIN -->
<div class="main">
